    <script>
        // === DATA ANGGOTA ===
        const dataAnggota = [
            {
                role: "JUNGLER",
                daftar: [
                    { nama: "Yobsz", foto: "IMG-20260510-WA0000.jpg", id: "12345678" , id: "1050534361"},
                    
                ]
            },
            {
                role: "GOLD LANER",
                daftar: [
                    { nama: "Renol", foto: "https://i.imgur.com/7ZbXyYb.jpg", id: "..." },
                    
                ]
            },
            {
                role: "ROAMER",
                daftar: [
                    { nama: "...", foto: "https://i.imgur.com/7ZbXyYb.jpg", id: "..." },
                    
                ]
            },
            {
                role: "EXP LANER",
                daftar: [
                    { nama: "...", foto: "https://i.imgur.com/7ZbXyYb.jpg", id: "..." },
                    
                ]
            },
            {
                role: "MID LANER",
                daftar: [
                    { nama: "...", foto: "https://i.imgur.com/7ZbXyYb.jpg", id: "..." },
                    
                ]
            }
        ];

        // === TAMPILAN AWAL ===
        document.addEventListener('DOMContentLoaded', function () {
            const tampilanAwal = document.getElementById('tampilan-awal');

            dataAnggota.forEach(role => {
                role.daftar.forEach(orang => {
                    const kartu = document.createElement('div');
                    kartu.className = "text-center group";
                    kartu.innerHTML = `
                        <div class="w-20 h-20 sm:w-24 sm:h-24 mx-auto rounded-full overflow-hidden border-2 border-pink-500 shadow-lg mb-2 group-hover:scale-105 transition-all">
                            <img src="${orang.foto}" alt="${orang.nama}" class="w-full h-full object-cover">
                        </div>
                        <p class="font-semibold text-white text-sm">${orang.nama}</p>
                    `;
                    tampilanAwal.appendChild(kartu);
                });
            });
        });

        // === FUNGSI TAMPILKAN ANGGOTA ===
        function tampilkanAnggota(namaRole) {
            const menuRole = document.getElementById('menu-role');
            const daftarAnggota = document.getElementById('daftar-anggota');
            const judulRole = document.getElementById('judul-role');
            const wadahKartu = document.getElementById('wadah-kartu');

            // Sembunyikan menu, tampilkan daftar
            menuRole.classList.add('hidden');
            daftarAnggota.classList.remove('hidden');

            // Cari data
            const dataDipilih = dataAnggota.find(item => item.role === namaRole);

            judulRole.textContent = "ROLE : " + namaRole;
            wadahKartu.innerHTML = '';

            // Masukkan anggota
            dataDipilih.daftar.forEach(orang => {
                const kartu = document.createElement('div');
                kartu.className = "bg-kartu border border-slate-700 rounded-xl overflow-hidden hover:scale-105 hover:border-pink-500 hover:shadow-lg transition-all duration-300 text-center p-4";
                kartu.innerHTML = `
                    <div class="w-full aspect-square rounded-lg overflow-hidden mb-4">
                        <img src="${orang.foto}" alt="${orang.nama}" class="w-full h-full object-cover">
                    </div>
                    <h3 class="text-xl font-bold text-white mb-2">${orang.nama}</h3>
                    <p class="text-pink-400 font-semibold">ID: ${orang.id}</p>
                `;
                wadahKartu.appendChild(kartu);
            });
        }

        // === FUNGSI KEMBALI ===
        function kembaliKeMenu() {
            document.getElementById('daftar-anggota').classList.add('hidden');
            document.getElementById('menu-role').classList.remove('hidden');
        }
    </script>
